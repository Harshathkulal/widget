version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: widget-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-widget_db}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_DATABASE:-widget_db}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - widget-network

  widget-server:
    build:
      context: ./widget-server
      dockerfile: Dockerfile
    container_name: widget-server
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_DATABASE: ${DB_DATABASE:-widget_db}
      JWT_SECRET: ${JWT_SECRET:-super-secret-jwt-change-me-in-production}
      WIDGET_JWT_SECRET: ${WIDGET_JWT_SECRET:-widget-jwt-secret-change-me-in-production}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - widget-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  widget-ui:
    build:
      context: ./widget-ui
      dockerfile: Dockerfile
    container_name: widget-ui
    restart: unless-stopped
    ports:
      - "4200:4200"
    depends_on:
      widget-server:
        condition: service_healthy
    networks:
      - widget-network

volumes:
  postgres_data:

networks:
  widget-network:
    driver: bridge
